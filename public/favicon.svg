<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Soft glow behind text -->
  <rect width="64" height="64" rx="14" fill="#6366f1" opacity="0.08"/>

  <!-- Border ring matching header style -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="13" fill="none" stroke="#6366f1" stroke-width="1.2" opacity="0.35"/>

  <!-- The </> symbol -->
  <text
    x="32"
    y="41"
    text-anchor="middle"
    font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
    font-size="22"
    font-weight="700"
    fill="url(#txt)"
    filter="url(#glow)"
    letter-spacing="-1"
  >&lt;/&gt;</text>
</svg>
